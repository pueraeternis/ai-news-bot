services:
  ai-news-bot:
    build: .
    image: telegram-bot
    container_name: ai-news-bot

    env_file:
      - .env

    environment:
      - TZ=Europe/Moscow
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1

    volumes:
      - ./db:/app/db
      - ./data:/app/data
      - ./logs:/app/logs

    restart: unless-stopped
