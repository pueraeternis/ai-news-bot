services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-openai-server
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface  
    ports:
      - "19000:8000" 
    command:
      - "--model"
      - "Qwen/Qwen3-VL-30B-A3B-Instruct"
      - "--trust-remote-code"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--max-model-len"
      - "32768"
